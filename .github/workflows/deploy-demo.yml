name: Deploy Demo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      # Deploys are a no-op until a VERCEL_TOKEN repo secret exists — create
      # one at https://vercel.com/account/tokens, then:
      #   gh secret set VERCEL_TOKEN --repo Stacksheild/foundry
      # Until then, deploy manually with `vercel --prod` from the repo root.
      - name: Check for deploy token
        id: gate
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN secret not set — skipping deploy (see workflow file for setup)."
          fi
      - uses: actions/checkout@v5
        if: steps.gate.outputs.enabled == 'true'
      - run: npm install --global vercel@latest
        if: steps.gate.outputs.enabled == 'true'
      - run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        if: steps.gate.outputs.enabled == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
